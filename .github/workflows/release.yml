name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: linux-arm
          - rid: linux-arm64
          - rid: osx-x64
          - rid: win-arm64
          - rid: win-x64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore workloads
        run: dotnet workload restore --project src/Server/App.Server.csproj

      - name: Publish ${{ matrix.rid }}
        run: >
          dotnet publish src/Server/App.Server.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastclock-${{ matrix.rid }}
          path: src/Server/bin/Release/net10.0/${{ matrix.rid }}/publish/fastclock-${{ matrix.rid }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.zip
